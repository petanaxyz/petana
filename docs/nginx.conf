# /etc/nginx/sites-available/petana
# Nginx config for petana.xyz
#
# Setup:
#   sudo ln -s /etc/nginx/sites-available/petana /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name petana.xyz www.petana.xyz api.petana.xyz;
    return 301 https://$host$request_uri;
}

# Main website (petana.xyz)
server {
    listen 443 ssl http2;
    server_name petana.xyz www.petana.xyz;

    ssl_certificate     /etc/letsencrypt/live/petana.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/petana.xyz/privkey.pem;

    root /var/www/petana/public_html;
    index index.html;

    # SPA fallback
    location /app {
        root /var/www/petana/public_html;
        try_files $uri $uri/ /app/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml;
}

# API backend (api.petana.xyz)
server {
    listen 443 ssl http2;
    server_name api.petana.xyz;

    ssl_certificate     /etc/letsencrypt/live/petana.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/petana.xyz/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 86400s;  # Long timeout for WebSocket
        proxy_send_timeout 86400s;
    }
}
